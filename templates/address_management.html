<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>收货地址 - 花间小筑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: #f8f8f8; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 导航 -->
<div class="h-12 bg-white flex items-center px-4 shrink-0 shadow-sm">
<a href="javascript:history.back()"><iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon></a>
<h1 class="flex-1 text-center font-bold text-gray-800 mr-6">收货地址</h1>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- 地址1 -->
<div class="bg-white p-4 rounded-2xl shadow-sm relative overflow-hidden group">
<div class="absolute top-0 right-0 bg-[#FF8FB1] text-white text-[10px] px-3 py-1 rounded-bl-xl">默认</div>
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2">
<span class="font-bold text-lg text-gray-800">王小美</span>
<span class="text-gray-500">138****8888</span>
</div>
<div class="text-sm text-gray-600 mt-2 pr-10">上海市浦东新区张江高科技园区创意园1号楼</div>
</div>
</div>
<div class="h-[1px] bg-gray-50 my-3"></div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-1 text-[#FF8FB1] text-xs font-bold">
<iconify-icon icon="mdi:check-circle"></iconify-icon>
<span>当前选中</span>
</div>
<div class="flex gap-4">
<iconify-icon class="text-gray-400 text-xl" icon="mdi:pencil-outline"></iconify-icon>
<iconify-icon class="text-gray-400 text-xl" icon="mdi:trash-can-outline"></iconify-icon>
</div>
</div>
</div>
<!-- 地址2 -->
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start">
<div>
<div class="flex items-center gap-2">
<span class="font-bold text-lg text-gray-800">李华</span>
<span class="text-gray-500">139****1234</span>
</div>
<div class="text-sm text-gray-600 mt-2 pr-10">上海市徐汇区虹桥路1号港汇恒隆广场12���</div>
</div>
</div>
<div class="h-[1px] bg-gray-50 my-3"></div>
<div class="flex justify-between items-center">
<div class="flex items-center gap-1 text-gray-400 text-xs">
<div class="w-4 h-4 rounded-full border border-gray-300"></div>
<span>设为默认</span>
</div>
<div class="flex gap-4">
<iconify-icon class="text-gray-400 text-xl" icon="mdi:pencil-outline"></iconify-icon>
<iconify-icon class="text-gray-400 text-xl" icon="mdi:trash-can-outline"></iconify-icon>
</div>
</div>
</div>
<div class="p-8 text-center text-gray-300 text-sm">
                - 最多可保存 10 个收货地址 -
            </div>
</div>
<!-- 底部添加 -->
<div class="p-4 bg-white border-t">
<button class="w-full h-12 bg-white border border-[#FF8FB1] text-[#FF8FB1] rounded-full font-bold flex items-center justify-center gap-2 active:bg-pink-50 transition-colors">
<iconify-icon icon="mdi:plus"></iconify-icon>
<span>新增收货地址</span>
</button>
</div>
</div>
</body>
</html>
