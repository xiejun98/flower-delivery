<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>确认订单 - 花间小筑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: #f8f8f8; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .btn-submit { background-color: #FF8FB1; color: white; }
        .radio-box { border: 1px solid #eee; transition: all 0.3s; }
        .radio-box.active { border-color: #FF8FB1; background-color: #fff8f9; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 导航 -->
<div class="h-12 bg-white flex items-center px-4 shrink-0">
<a href="product_detail.html"><iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon></a>
<h1 class="flex-1 text-center font-bold text-gray-800 mr-6">确认订单</h1>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- 收货地址 -->
<div class="bg-white p-4 rounded-2xl flex items-center justify-between" onclick="location.href='address_management.html'">
<div class="flex items-start gap-3">
<iconify-icon class="text-[#FF8FB1] text-xl mt-1" icon="mdi:map-marker"></iconify-icon>
<div>
<div class="flex items-center gap-2">
<span class="font-bold text-gray-800">王小美</span>
<span class="text-gray-500 text-sm">138****8888</span>
</div>
<div class="text-sm text-gray-600 mt-1 line-clamp-1">上海市浦东新区张江高科技园区创意园1号楼</div>
</div>
</div>
<iconify-icon class="text-gray-300 text-xl" icon="mdi:chevron-right"></iconify-icon>
</div>
<!-- 商品信息 -->
<div class="bg-white p-4 rounded-2xl">
<div class="flex gap-3">
<div class="w-20 h-20 bg-red-50 rounded-xl overflow-hidden shrink-0">
<img alt="Small Rose Bouquet Preview" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/5ce9b5051899472eb8bbdf7948cfd72d.jpg"/>
</div>
<div class="flex-1 flex flex-col justify-between py-0.5">
<h3 class="text-sm font-bold text-gray-800">红玫瑰经典花束</h3>
<div class="flex justify-between items-end">
<span class="text-xs text-gray-400">数量: 1</span>
<span class="text-sm font-bold text-gray-800">¥198.00</span>
</div>
</div>
</div>
</div>
<!-- 配送日期 -->
<div class="bg-white p-4 rounded-2xl">
<h4 class="text-sm font-bold text-gray-800 mb-3">配送日期</h4>
<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
<div class="radio-box active px-4 py-2 rounded-xl text-center shrink-0">
<div class="text-xs text-gray-500">今天</div>
<div class="text-sm font-bold">06-30</div>
</div>
<div class="radio-box px-4 py-2 rounded-xl text-center shrink-0">
<div class="text-xs text-gray-500">明天</div>
<div class="text-sm font-bold">07-01</div>
</div>
<div class="radio-box px-4 py-2 rounded-xl text-center shrink-0">
<div class="text-xs text-gray-500">周四</div>
<div class="text-sm font-bold">07-02</div>
</div>
</div>
</div>
<!-- 配送时段 -->
<div class="bg-white p-4 rounded-2xl">
<h4 class="text-sm font-bold text-gray-800 mb-3">配送时段</h4>
<div class="grid grid-cols-3 gap-2">
<div class="radio-box px-2 py-2 rounded-xl text-center active">
<div class="text-[10px] text-gray-500">早间档</div>
<div class="text-xs">9:00-12:00</div>
</div>
<div class="radio-box px-2 py-2 rounded-xl text-center">
<div class="text-[10px] text-gray-500">午间档</div>
<div class="text-xs">14:00-17:00</div>
</div>
<div class="radio-box px-2 py-2 rounded-xl text-center">
<div class="text-[10px] text-gray-500">晚间档</div>
<div class="text-xs">18:00-21:00</div>
</div>
</div>
</div>
<!-- 贺卡留言 -->
<div class="bg-white p-4 rounded-2xl">
<h4 class="text-sm font-bold text-gray-800 mb-2">贺卡留言</h4>
<textarea class="w-full h-20 bg-gray-50 rounded-xl p-3 text-sm outline-none resize-none" placeholder="写下您的祝福语..."></textarea>
</div>
<!-- 费用汇总 -->
<div class="bg-white p-4 rounded-2xl space-y-3">
<div class="flex justify-between text-sm">
<span class="text-gray-500">商品金额</span>
<span class="text-gray-800">¥198.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-500">配送费</span>
<span class="text-gray-800">¥12.00</span>
</div>
<div class="flex justify-between text-sm">
<span class="text-gray-500">节日加价</span>
<span class="text-[#FF4444]">¥20.00</span>
</div>
<div class="h-[1px] bg-gray-50"></div>
<div class="flex justify-between items-center">
<span class="font-bold text-gray-800">合计</span>
<span class="text-[#FF4444] text-lg font-bold">¥230.00</span>
</div>
</div>
</div>
<!-- 底部提交 -->
<div class="h-20 bg-white border-t px-6 flex items-center justify-between shrink-0">
<div>
<span class="text-xs text-gray-400">待支付</span>
<span class="text-[#FF4444] text-xl font-bold ml-1">¥230.00</span>
</div>
<button class="w-36 h-12 btn-submit rounded-full font-bold shadow-lg shadow-pink-100" onclick="submitOrder()">提交订单</button>
</div>
<!-- 支付���功弹窗 -->
<div class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-6" id="successModal">
<div class="bg-white w-full rounded-3xl p-8 flex flex-col items-center animate-bounce-in">
<div class="w-16 h-16 bg-green-100 text-green-500 rounded-full flex items-center justify-center text-3xl mb-4">
<iconify-icon icon="mdi:check"></iconify-icon>
</div>
<h3 class="text-xl font-bold text-gray-800">支付成功</h3>
<p class="text-sm text-gray-400 mt-2 text-center">鲜花将按时为您送达</p>
<p class="text-[10px] text-gray-300 mt-6">正在跳转订单中心...</p>
</div>
</div>
</div>
<script>
        function submitOrder() {
            document.getElementById('successModal').classList.remove('hidden');
            setTimeout(() => {
                location.href = 'my_orders.html';
            }, 2000);
        }
    </script>
</body>
</html>
