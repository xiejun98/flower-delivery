<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>配送进度 - 花间小筑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: #f8f8f8; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .step-active { background-color: #FF8FB1; color: white; border-color: #FF8FB1; }
        .step-done { background-color: #4ADE80; color: white; border-color: #4ADE80; }
        .step-none { background-color: #E5E7EB; color: #9CA3AF; border-color: #E5E7EB; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 导航 -->
<div class="h-12 bg-white flex items-center px-4 shrink-0 shadow-sm">
<a href="my_orders.html"><iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon></a>
<h1 class="flex-1 text-center font-bold text-gray-800 mr-6">配送进度</h1>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- 订单卡片 -->
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="text-xs text-gray-400 mb-2">订单号：2026063001</div>
<div class="space-y-2">
<div class="flex justify-between">
<span class="text-sm text-gray-500">收花人</span>
<span class="text-sm font-bold text-gray-800">王小美 (138****8888)</span>
</div>
<div class="flex justify-between">
<span class="text-sm text-gray-500">配送地址</span>
<span class="text-sm font-bold text-gray-800 text-right max-w-[200px]">上海市浦东新区张江高科技园区创意园1号楼</span>
</div>
<div class="flex justify-between">
<span class="text-sm text-gray-500">配送时段</span>
<span class="text-sm font-bold text-[#FF8FB1]">今天 09:00-12:00</span>
</div>
</div>
</div>
<!-- 进度追踪 -->
<div class="bg-white p-6 rounded-2xl shadow-sm">
<div class="relative flex justify-between items-center px-2">
<!-- 线条背景 -->
<div class="absolute top-4 left-4 right-4 h-0.5 bg-gray-100 z-0"></div>
<!-- 线条激活 -->
<div class="absolute top-4 left-4 w-2/3 h-0.5 bg-[#FF8FB1] z-0"></div>
<!-- 步骤点 -->
<div class="relative z-10 flex flex-col items-center">
<div class="w-8 h-8 rounded-full border-2 step-done flex items-center justify-center text-lg">
<iconify-icon icon="mdi:check"></iconify-icon>
</div>
<span class="text-[10px] mt-2 font-bold text-gray-400">待接单</span>
</div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-8 h-8 rounded-full border-2 step-done flex items-center justify-center text-lg">
<iconify-icon icon="mdi:check"></iconify-icon>
</div>
<span class="text-[10px] mt-2 font-bold text-gray-400">待配送</span>
</div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-8 h-8 rounded-full border-2 step-active flex items-center justify-center text-lg">
<iconify-icon icon="mdi:moped"></iconify-icon>
</div>
<span class="text-[10px] mt-2 font-bold text-[#FF8FB1]">配送中</span>
</div>
<div class="relative z-10 flex flex-col items-center">
<div class="w-8 h-8 rounded-full border-2 step-none flex items-center justify-center text-lg">
<iconify-icon icon="mdi:flag-variant"></iconify-icon>
</div>
<span class="text-[10px] mt-2 font-bold text-gray-300">已送达</span>
</div>
</div>
<div class="mt-8 border-l-2 border-gray-50 ml-6 pl-6 space-y-6">
<div class="relative">
<div class="absolute -left-[31px] top-1 w-2.5 h-2.5 rounded-full bg-[#FF8FB1] border-2 border-white"></div>
<div class="text-sm font-bold text-gray-800">骑手已出发</div>
<div class="text-[10px] text-gray-400 mt-1">骑手张师傅正快马加鞭赶往配送地</div>
<div class="text-[10px] text-gray-400 mt-0.5">2026-06-30 08:45</div>
</div>
<div class="relative">
<div class="absolute -left-[31px] top-1 w-2.5 h-2.5 rounded-full bg-gray-200 border-2 border-white"></div>
<div class="text-sm text-gray-500">花店已接单</div>
<div class="text-[10px] text-gray-400 mt-1">订单已在制作中心分配</div>
<div class="text-[10px] text-gray-400 mt-0.5">2026-06-30 07:45</div>
</div>
</div>
<div class="mt-6 p-3 bg-red-50 rounded-xl flex items-center gap-2">
<iconify-icon class="text-red-400" icon="mdi:alert-circle"></iconify-icon>
<span class="text-xs text-red-500 font-medium">⚠️ 配送可能略有超时，请耐心等待</span>
</div>
</div>
<!-- 骑手信息 -->
<div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-gray-100 rounded-full overflow-hidden">
<img alt="Rider Avatar" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/59c872638961489ebc73192caded78c7.jpg"/>
</div>
<div>
<div class="font-bold text-gray-800">张师傅</div>
<div class="text-[10px] text-gray-400">已配送 2541 单 | 4.9分</div>
</div>
</div>
<div class="flex gap-4">
<div class="w-10 h-10 rounded-full bg-green-50 flex items-center justify-center text-green-500 text-xl active:scale-95 transition-all">
<iconify-icon icon="mdi:phone"></iconify-icon>
</div>
<div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 text-xl active:scale-95 transition-all">
<iconify-icon icon="mdi:message-text"></iconify-icon>
</div>
</div>
</div>
</div>
<!-- 底部 -->
<div class="p-4 bg-white border-t">
<button class="w-full h-12 bg-[#FF8FB1] text-white rounded-full font-bold shadow-lg shadow-pink-100">联系骑手</button>
</div>
</div>
</body>
</html>
