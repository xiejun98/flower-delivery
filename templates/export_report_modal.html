<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>导出报表 - 店主后台</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: rgba(0,0,0,0.5); font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; margin: 0 auto; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 24px; }
        .option-card { border: 2px solid #eee; transition: all 0.3s; }
        .option-card.active { border-color: #FF8FB1; background: #fff8f9; }
    </style>
</head>
<body>
<div class="app-container">
<div class="bg-white w-full rounded-[32px] overflow-hidden p-6 animate-bounce-in">
<div class="flex justify-between items-center mb-6">
<h3 class="text-xl font-bold text-gray-800">导出数据报表</h3>
<a href="shop_owner_stats.html"><iconify-icon class="text-2xl text-gray-400" icon="mdi:close"></iconify-icon></a>
</div>
<div class="space-y-6">
<div>
<label class="text-sm font-bold text-gray-800 block mb-3">选择时间范围</label>
<div class="grid grid-cols-3 gap-2">
<div class="option-card active p-2 rounded-xl text-center text-xs font-medium cursor-pointer">本周数据</div>
<div class="option-card p-2 rounded-xl text-center text-xs font-medium cursor-pointer text-gray-500">本月数据</div>
<div class="option-card p-2 rounded-xl text-center text-xs font-medium cursor-pointer text-gray-500">自定义</div>
</div>
</div>
<div>
<label class="text-sm font-bold text-gray-800 block mb-3">选择导出格式</label>
<div class="flex gap-4">
<label class="flex items-center gap-2 text-sm text-gray-700">
<input checked="" class="accent-[#FF8FB1] w-4 h-4" name="format" type="radio"/> Excel (.xlsx)
                        </label>
<label class="flex items-center gap-2 text-sm text-gray-700">
<input class="accent-[#FF8FB1] w-4 h-4" name="format" type="radio"/> PDF 文档
                        </label>
</div>
</div>
<div class="bg-gray-50 p-4 rounded-2xl flex items-center gap-3">
<iconify-icon class="text-2xl text-gray-400" icon="mdi:email-outline"></iconify-icon>
<div class="flex-1">
<div class="text-[10px] text-gray-400">报表将发送至绑定邮箱</div>
<div class="text-sm font-bold text-gray-700">flower_shop@example.com</div>
</div>
</div>
<button class="w-full h-14 bg-[#FF8FB1] text-white rounded-2xl font-bold text-lg shadow-xl shadow-pink-100 active:scale-95 transition-all" onclick="alert('报表已开始生成，请留意邮箱通知'); location.href='shop_owner_stats.html'">确认导出</button>
</div>
</div>
</div>
</body>
</html>
