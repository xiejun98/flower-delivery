<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>登录 - 花间小筑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', -apple-system, sans-serif; }
        .app-container { width: 375px; height: 812px; background: white; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #FF8FB1; color: white; transition: all 0.3s; }
        .btn-primary:active { background-color: #FF6B9D; transform: scale(0.98); }
        .input-group { border-bottom: 1px solid #eee; }
        .modal-overlay { background: rgba(0,0,0,0.5); display: none; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 状态栏 -->
<div class="h-10 flex justify-between items-center px-6 text-xs text-gray-400">
<span>09:41</span>
<div class="flex gap-1">
<iconify-icon icon="mdi:signal"></iconify-icon>
<iconify-icon icon="mdi:wifi"></iconify-icon>
<iconify-icon icon="mdi:battery"></iconify-icon>
</div>
</div>
<!-- 品牌区域 -->
<div class="flex-1 flex flex-col items-center justify-center pb-20">
<div class="w-24 h-24 bg-[#FF8FB1] rounded-full flex items-center justify-center mb-4 shadow-lg shadow-pink-200">
<iconify-icon class="text-white text-5xl" icon="mdi:flower"></iconify-icon>
</div>
<h1 class="text-2xl font-bold text-gray-800">花间小筑</h1>
<p class="text-gray-400 mt-2">同城鲜花速递 · 传递每一份爱</p>
</div>
<!-- 登录表单 -->
<div class="px-8 pb-12">
<div class="flex items-center gap-3 py-4 input-group">
<span class="text-gray-500 font-medium">+86</span>
<input class="flex-1 outline-none text-gray-700" placeholder="请输入手机号" type="tel"/>
<iconify-icon class="text-gray-300" icon="mdi:phone-outline"></iconify-icon>
</div>
<div class="flex items-center gap-3 py-4 input-group mt-4">
<input class="flex-1 outline-none text-gray-700" placeholder="请输入验证码" type="number"/>
<button class="text-[#FF8FB1] text-sm font-medium" id="sendBtn" onclick="startTimer()">获取验证码</button>
</div>
<button class="w-full h-12 btn-primary rounded-xl mt-10 font-bold shadow-lg shadow-pink-100" onclick="showIdentity()">立即登录</button>
<p class="text-center text-[10px] text-gray-400 mt-6">
                登录即表示同意 <span class="text-[#FF8FB1]">《用户服务协议》</span> 和 <span class="text-[#FF8FB1]">《隐私政策》</span>
</p>
</div>
<!-- 身份选择弹窗 -->
<div class="modal-overlay absolute inset-0 z-50 flex-col justify-end" id="identityModal">
<div class="bg-white rounded-t-[32px] p-8 animate-slide-up">
<div class="flex justify-between items-center mb-6">
<h3 class="text-lg font-bold text-gray-800">选择您的身份</h3>
<button onclick="hideIdentity()"><iconify-icon class="text-2xl text-gray-400" icon="mdi:close"></iconify-icon></button>
</div>
<div class="space-y-4">
<a class="flex items-center justify-between p-5 bg-pink-50 rounded-2xl border border-pink-100 group active:scale-95 transition-all" href="consumer_home.html">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-2xl">🌸</div>
<div class="text-left">
<div class="font-bold text-gray-800">我是消费者</div>
<div class="text-xs text-pink-400">订购鲜花、送礼传情</div>
</div>
</div>
<iconify-icon class="text-pink-300 text-xl" icon="mdi:chevron-right"></iconify-icon>
</a>
<a class="flex items-center justify-between p-5 bg-blue-50 rounded-2xl border border-blue-100 active:scale-95 transition-all" href="shop_owner_orders.html">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-2xl">🏪</div>
<div class="text-left">
<div class="font-bold text-gray-800">我是花店店主</div>
<div class="text-xs text-blue-400">接单管理、库存统计</div>
</div>
</div>
<iconify-icon class="text-blue-300 text-xl" icon="mdi:chevron-right"></iconify-icon>
</a>
<a class="flex items-center justify-between p-5 bg-green-50 rounded-2xl border border-green-100 active:scale-95 transition-all" href="rider_orders.html">
<div class="flex items-center gap-4">
<div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-2xl">🚴</div>
<div class="text-left">
<div class="font-bold text-gray-800">我是骑手</div>
<div class="text-xs text-green-400">附近配送、收入中心</div>
</div>
</div>
<iconify-icon class="text-green-300 text-xl" icon="mdi:chevron-right"></iconify-icon>
</a>
</div>
<div class="h-6"></div>
</div>
</div>
</div>
<script>
        function startTimer() {
            const btn = document.getElementById('sendBtn');
            if (btn.disabled) return;
            let count = 60;
            btn.disabled = true;
            btn.classList.add('text-gray-400');
            const timer = setInterval(() => {
                count--;
                btn.innerText = count + 's后重新获取';
                if (count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '获取验证码';
                    btn.classList.remove('text-gray-400');
                }
            }, 1000);
        }

        function showIdentity() {
            document.getElementById('identityModal').classList.add('active');
        }

        function hideIdentity() {
            document.getElementById('identityModal').classList.remove('active');
        }
    </script>
</body>
</html>
