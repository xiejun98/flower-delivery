<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>商品详情 - 花间小筑</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: white; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .btn-buy { background-color: #FF8FB1; color: white; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 导航 -->
<div class="absolute top-4 left-4 z-10">
<a class="w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm" href="consumer_home.html">
<iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon>
</a>
</div>
<div class="flex-1 overflow-y-auto pb-24">
<!-- 商品大图 -->
<div class="h-[375px] bg-red-50">
<img alt="Luxurious Red Rose Bouquet Close-up" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/27d8845ef3ea43e384980dc096eb3e59.jpg"/>
</div>
<div class="p-6 bg-white -mt-6 rounded-t-[24px] relative z-0">
<div class="flex justify-between items-start">
<div>
<h1 class="text-2xl font-bold text-gray-800">红玫瑰经典花束</h1>
<p class="text-sm text-gray-400 mt-1">精选昆明直采 11枝 厄瓜多尔玫瑰</p>
</div>
<div class="flex flex-col items-end">
<div class="text-[#FF4444] text-3xl font-bold">¥198</div>
<div class="text-gray-300 text-sm line-through">¥258</div>
</div>
</div>
<div class="mt-6 p-4 bg-pink-50 rounded-2xl flex items-start gap-3">
<iconify-icon class="text-[#FF8FB1] text-xl mt-0.5" icon="mdi:heart"></iconify-icon>
<div>
<div class="text-sm font-bold text-[#FF8FB1]">花语</div>
<div class="text-xs text-pink-400 mt-1 leading-relaxed">这一刻，只想把全世界的温柔都送给你。红玫瑰代表热烈的爱。</div>
</div>
</div>
<div class="mt-6 space-y-4">
<div class="flex items-center gap-3">
<iconify-icon class="text-gray-400 text-xl" icon="mdi:truck-delivery"></iconify-icon>
<span class="text-sm text-gray-600">同城配送 2小时达 | 支持当日达</span>
</div>
<div class="flex items-center gap-3">
<iconify-icon class="text-gray-400 text-xl" icon="mdi:shield-check"></iconify-icon>
<span class="text-sm text-gray-600">售后无忧 · 鲜花坏损包赔</span>
</div>
</div>
<div class="mt-8">
<div class="flex justify-between items-center">
<span class="font-bold text-gray-800">购买数量</span>
<div class="flex items-center gap-4 bg-gray-50 p-1 rounded-full">
<button class="w-8 h-8 flex items-center justify-center text-gray-400" onclick="changeQty(-1)"><iconify-icon icon="mdi:minus"></iconify-icon></button>
<span class="text-lg font-bold w-4 text-center" id="qty">1</span>
<button class="w-8 h-8 flex items-center justify-center text-gray-800" onclick="changeQty(1)"><iconify-icon icon="mdi:plus"></iconify-icon></button>
</div>
</div>
<div class="mt-2 text-right text-[10px] text-gray-400">已售 128 件 | 剩余 72 件</div>
</div>
</div>
</div>
<!-- 底部购买 -->
<div class="absolute bottom-0 left-0 right-0 h-20 bg-white border-t px-6 flex items-center justify-between">
<div class="flex gap-6">
<div class="flex flex-col items-center">
<iconify-icon class="text-xl text-gray-600" icon="mdi:store-outline"></iconify-icon>
<span class="text-[10px] text-gray-500 mt-0.5">进店</span>
</div>
<div class="flex flex-col items-center">
<iconify-icon class="text-xl text-gray-600" icon="mdi:cart-outline"></iconify-icon>
<span class="text-[10px] text-gray-500 mt-0.5">购物车</span>
</div>
</div>
<a class="flex-1 ml-6 h-12 btn-buy rounded-full flex items-center justify-center font-bold shadow-lg shadow-pink-100" href="checkout.html">
                立即预定
            </a>
</div>
</div>
<script>
        let qty = 1;
        function changeQty(delta) {
            qty = Math.max(1, Math.min(99, qty + delta));
            document.getElementById('qty').innerText = qty;
        }
    </script>
</body>
</html>
