<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>分配骑手 - 店主后台</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: rgba(0,0,0,0.5); font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; margin: 0 auto; position: relative; display: flex; flex-direction: column; justify-content: flex-end; }
    </style>
</head>
<body>
<div class="app-container">
<div class="bg-white rounded-t-[32px] p-6 animate-slide-up w-full">
<div class="flex justify-between items-center mb-6">
<h3 class="text-lg font-bold text-gray-800">选择配送骑手</h3>
<a href="shop_owner_orders.html"><iconify-icon class="text-2xl text-gray-400" icon="mdi:close"></iconify-icon></a>
</div>
<div class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
<!-- 骑手列表 -->
<div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white rounded-full overflow-hidden shadow-sm">
<img alt="Rider Zhang" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/9675a1b5d98348539bad8b3de3068a11.jpg"/>
</div>
<div>
<div class="font-bold text-gray-800 flex items-center gap-2">
                                张师傅 
                                <span class="text-[10px] bg-green-100 text-green-600 px-1.5 rounded">空闲中</span>
</div>
<div class="text-[10px] text-gray-400 mt-1">当前 0 单 | 距离店铺 0.8km | 4.9分</div>
</div>
</div>
<button class="bg-[#FF8FB1] text-white text-xs font-bold px-4 py-2 rounded-full shadow-md shadow-pink-100" onclick="location.href='shop_owner_orders.html'">分配</button>
</div>
<div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white rounded-full overflow-hidden shadow-sm">
<img alt="Rider Li" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/06643da97d0443459fd9e71459175524.jpg"/>
</div>
<div>
<div class="font-bold text-gray-800 flex items-center gap-2">
                                李师傅 
                                <span class="text-[10px] bg-orange-100 text-orange-600 px-1.5 rounded">配送中</span>
</div>
<div class="text-[10px] text-gray-400 mt-1">当前 2 单 | 距离店铺 1.5km | 4.8分</div>
</div>
</div>
<button class="bg-[#FF8FB1] text-white text-xs font-bold px-4 py-2 rounded-full shadow-md shadow-pink-100">分配</button>
</div>
<div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-gray-100">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white rounded-full overflow-hidden shadow-sm">
<img alt="Rider Wang" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/fdcd48d6128d4f3b847cd799c3666ff5.jpg"/>
</div>
<div>
<div class="font-bold text-gray-800 flex items-center gap-2">
                                王师傅 
                                <span class="text-[10px] bg-gray-200 text-gray-500 px-1.5 rounded">离线</span>
</div>
<div class="text-[10px] text-gray-400 mt-1">上次在线 1小时前 | 4.7分</div>
</div>
</div>
<button class="bg-gray-200 text-gray-400 text-xs font-bold px-4 py-2 rounded-full cursor-not-allowed">分配</button>
</div>
</div>
<div class="h-10"></div>
</div>
</div>
</body>
</html>
