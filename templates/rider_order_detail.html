<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>订单详情 - 骑手端</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: #f8f8f8; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 导航 -->
<div class="h-12 bg-white flex items-center px-4 shrink-0 shadow-sm">
<a href="rider_orders.html"><iconify-icon class="text-2xl text-gray-800" icon="mdi:chevron-left"></iconify-icon></a>
<h1 class="flex-1 text-center font-bold text-gray-800 mr-6">订单详情</h1>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4">
<!-- 状态条 -->
<div class="bg-gradient-to-r from-orange-400 to-[#FF8FB1] p-6 rounded-2xl text-white">
<div class="flex items-center gap-3">
<iconify-icon class="text-3xl" icon="mdi:moped"></iconify-icon>
<div>
<div class="text-lg font-bold">待配送</div>
<div class="text-[10px] opacity-80">请于 12:00 前送达，目前还剩 45 分钟</div>
</div>
</div>
</div>
<!-- 收货信息 -->
<div class="bg-white p-4 rounded-2xl shadow-sm">
<div class="flex justify-between items-start mb-4">
<h3 class="font-bold text-gray-800">配送信息</h3>
<div class="px-2 py-0.5 bg-blue-50 text-blue-500 text-[10px] rounded">导航</div>
</div>
<div class="space-y-4">
<div class="flex gap-3">
<iconify-icon class="text-red-400 text-xl" icon="mdi:map-marker"></iconify-icon>
<div>
<div class="text-lg font-bold text-gray-800">张江高科技园区创意园1号楼</div>
<div class="text-sm text-gray-500 mt-0.5">上海市浦东新区...</div>
</div>
</div>
<div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
<div class="flex items-center gap-3">
<div class="w-8 h-8 bg-[#FF8FB1]/10 rounded-full flex items-center justify-center text-[#FF8FB1]">
<iconify-icon icon="mdi:account"></iconify-icon>
</div>
<span class="text-sm font-bold">王小美</span>
</div>
<iconify-icon class="text-blue-500 text-2xl" icon="mdi:phone"></iconify-icon>
</div>
</div>
</div>
<!-- 订单内容 -->
<div class="bg-white p-4 rounded-2xl shadow-sm">
<h3 class="font-bold text-gray-800 mb-3">订单内容</h3>
<div class="flex gap-3">
<div class="w-16 h-16 bg-red-50 rounded-lg overflow-hidden shrink-0">
<img alt="Order Preview" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/a0dc022edaf64b3183ba468687783924.jpg"/>
</div>
<div class="flex-1 flex flex-col justify-center">
<div class="text-sm font-bold text-gray-800">红玫瑰经典花束 × 1</div>
<div class="text-[10px] text-gray-400 mt-1">订单编号：2026063001</div>
</div>
</div>
<div class="mt-4 p-3 bg-pink-50 rounded-xl">
<div class="text-[10px] text-pink-400 font-bold mb-1">备注：</div>
<div class="text-xs text-pink-600">放在公司前台即可，谢谢！</div>
</div>
</div>
</div>
<!-- 底部 -->
<div class="p-4 bg-white border-t flex gap-3">
<button class="flex-1 h-12 bg-[#FF8FB1] text-white rounded-xl font-bold shadow-lg shadow-pink-100">取花出发</button>
<button class="px-6 h-12 border border-red-400 text-red-400 rounded-xl font-bold">上报异常</button>
</div>
</div>
</body>
</html>
