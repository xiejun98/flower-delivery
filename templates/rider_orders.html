<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, user-scalable=no" name="viewport"/>
<title>待配送订单 - 骑手端</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
<style>
        body { background-color: #f8f8f8; font-family: 'PingFang SC', sans-serif; }
        .app-container { width: 375px; height: 812px; background: #f8f8f8; margin: 0 auto; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .tab-active { color: #FF8FB1; border-bottom: 2px solid #FF8FB1; font-weight: bold; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
<div class="app-container">
<!-- 顶部个人信息 -->
<div class="bg-[#FF8FB1] p-6 pb-12 shrink-0">
<div class="flex items-center justify-between text-white">
<div class="flex items-center gap-3">
<div class="w-12 h-12 bg-white/20 rounded-full border-2 border-white/50 overflow-hidden">
<img alt="Rider Avatar" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-06-30/6c15eb47381244f9a35642ca1f2ac195.jpg"/>
</div>
<div>
<div class="font-bold text-lg">您好，张师傅</div>
<div class="text-[10px] opacity-80">今日配送统计：已完成 12 单 / 共 15 单</div>
</div>
</div>
<iconify-icon class="text-2xl" icon="mdi:bell"></iconify-icon>
</div>
</div>
<!-- 订单概览卡片 -->
<div class="px-4 -mt-8 relative z-10 shrink-0">
<div class="bg-white rounded-2xl p-4 shadow-xl flex justify-around">
<div class="text-center">
<div class="text-xl font-bold text-gray-800">¥128.5</div>
<div class="text-[10px] text-gray-400">今日预计收入</div>
</div>
<div class="w-[1px] bg-gray-100 h-10"></div>
<div class="text-center">
<div class="text-xl font-bold text-gray-800">4.9</div>
<div class="text-[10px] text-gray-400">服务评分</div>
</div>
</div>
</div>
<!-- Tab -->
<div class="bg-white flex h-10 shrink-0 mt-4 border-b">
<div class="flex-1 flex items-center justify-center text-sm tab-active">待配送 (2)</div>
<div class="flex-1 flex items-center justify-center text-sm text-gray-500">配送中 (1)</div>
<div class="flex-1 flex items-center justify-center text-sm text-gray-500">已完成</div>
</div>
<div class="flex-1 overflow-y-auto p-4 space-y-4 pb-20">
<!-- 订单1 -->
<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50">
<div class="flex justify-between items-start mb-3">
<div class="status-badge bg-orange-50 text-orange-500">早间档 09:00-12:00</div>
<span class="text-xs text-[#FF8FB1] font-bold">1.2km</span>
</div>
<a class="block" href="rider_order_detail.html">
<div class="text-lg font-bold text-gray-800 leading-snug line-clamp-2">上海市浦东新区张江高科技园区创意园1号楼</div>
<div class="mt-2 flex items-center gap-2 text-sm text-gray-500">
<span>王小美</span>
<iconify-icon class="text-blue-400 text-lg" icon="mdi:phone"></iconify-icon>
</div>
</a>
<div class="h-[1px] bg-gray-50 my-4"></div>
<div class="flex gap-3">
<button class="flex-1 h-10 bg-[#FF8FB1] text-white rounded-xl text-sm font-bold active:scale-95 transition-all" onclick="showConfirmModal('take')">取花出发</button>
<button class="px-4 h-10 border border-gray-200 text-gray-400 rounded-xl text-sm active:bg-gray-50" onclick="showExceptionModal()">上报异常</button>
</div>
</div>
<!-- 订单2 -->
<div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-50">
<div class="flex justify-between items-start mb-3">
<div class="status-badge bg-blue-50 text-blue-500">午间档 14:00-17:00</div>
<span class="text-xs text-[#FF8FB1] font-bold">4.5km</span>
</div>
<div class="text-lg font-bold text-gray-800 leading-snug line-clamp-2">上海市徐汇区虹桥路1号港汇恒隆广场</div>
<div class="mt-2 flex items-center gap-2 text-sm text-gray-500">
<span>李先生</span>
<iconify-icon class="text-blue-400 text-lg" icon="mdi:phone"></iconify-icon>
</div>
<div class="h-[1px] bg-gray-50 my-4"></div>
<div class="flex gap-3">
<button class="flex-1 h-10 bg-[#FF8FB1] text-white rounded-xl text-sm font-bold">取花出发</button>
<button class="px-4 h-10 border border-gray-200 text-gray-400 rounded-xl text-sm">上报异常</button>
</div>
</div>
</div>
<!-- 底部导航 -->
<div class="flex-none h-16 bg-white border-t flex items-center justify-around px-4 pb-2">
<div class="flex flex-col items-center text-[#FF8FB1]">
<iconify-icon class="text-2xl" icon="mdi:moped"></iconify-icon>
<span class="text-[10px] mt-0.5">配送任务</span>
</div>
<a class="flex flex-col items-center text-gray-400" href="profile.html">
<iconify-icon class="text-2xl" icon="mdi:account-outline"></iconify-icon>
<span class="text-[10px] mt-0.5">个人中心</span>
</a>
</div>
<!-- 全局弹窗逻辑 (配送确认) -->
<div class="hidden fixed inset-0 z-[100] bg-black/50 flex items-center justify-center p-6" id="confirmModal">
<div class="bg-white w-full rounded-3xl p-6 text-center animate-bounce-in">
<div class="w-16 h-16 bg-pink-50 text-[#FF8FB1] rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
<iconify-icon icon="mdi:moped-electric"></iconify-icon>
</div>
<h3 class="text-lg font-bold text-gray-800" id="modalTitle">确认取花出发？</h3>
<p class="text-sm text-gray-400 mt-2">点击确认后，用户将收到配送中提醒</p>
<div class="mt-8 flex gap-3">
<button class="flex-1 h-12 bg-gray-100 text-gray-500 rounded-xl font-bold" onclick="closeModals()">取消</button>
<button class="flex-1 h-12 bg-[#FF8FB1] text-white rounded-xl font-bold shadow-lg shadow-pink-100" onclick="actionConfirm()">确认出发</button>
</div>
</div>
</div>
<!-- 异常上报弹窗 -->
<div class="hidden fixed inset-0 z-[100] bg-black/50 flex flex-col justify-end" id="exceptionModal">
<div class="bg-white rounded-t-[32px] p-6 animate-slide-up">
<div class="flex justify-between items-center mb-6">
<h3 class="text-lg font-bold text-gray-800">上报配送异常</h3>
<button onclick="closeModals()"><iconify-icon class="text-2xl text-gray-400" icon="mdi:close"></iconify-icon></button>
</div>
<div class="space-y-4">
<div class="grid grid-cols-2 gap-3">
<div class="p-3 border rounded-xl flex flex-col items-center gap-1 active:border-[#FF8FB1] active:bg-pink-50">
<iconify-icon class="text-2xl text-gray-400" icon="mdi:map-marker-remove"></iconify-icon>
<span class="text-xs">地址错误</span>
</div>
<div class="p-3 border rounded-xl flex flex-col items-center gap-1">
<iconify-icon class="text-2xl text-gray-400" icon="mdi:account-cancel"></iconify-icon>
<span class="text-xs">收件人拒收</span>
</div>
</div>
<textarea class="w-full h-24 bg-gray-50 rounded-2xl p-4 text-sm outline-none" placeholder="请详细描述异常情况..."></textarea>
<button class="w-full h-12 bg-[#FF8FB1] text-white rounded-xl font-bold shadow-lg shadow-pink-100" onclick="submitException()">提交上报</button>
</div>
<div class="h-6"></div>
</div>
</div>
</div>
<script>
        function showConfirmModal(type) {
            document.getElementById('confirmModal').classList.remove('hidden');
        }
        function showExceptionModal() {
            document.getElementById('exceptionModal').classList.remove('hidden');
        }
        function closeModals() {
            document.getElementById('confirmModal').classList.add('hidden');
            document.getElementById('exceptionModal').classList.add('hidden');
        }
        function actionConfirm() {
            alert('状态已更新为配送中');
            closeModals();
        }
        function submitException() {
            alert('异常已上报，客服将介入处理');
            closeModals();
        }
    </script>
</body>
</html>
